<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Habitarian Tunes · Lisboa</title>
  <meta name="description" content="Quartos privados em edifícios históricos de Lisboa. Lista de espera aberta." />
  <meta property="og:title" content="Habitarian Tunes · Lisboa" />
  <meta property="og:description" content="Quartos privados em edifícios históricos de Lisboa. Abrimos em Agosto de 2027." />
  <meta property="og:image" content="assets/logo-primary.png" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="assets/symbol-dome.png" />
  <link rel="stylesheet" href="design-system/colors_and_type.css" />
  <style>
    html, body, #root {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
    }
    body {
      font-family: var(--font-sans);
      color: var(--ink-100);
      -webkit-font-smoothing: antialiased;
    }
    *, *::before, *::after { box-sizing: border-box; }
    button { font-family: inherit; }
    input, textarea { font-family: inherit; }
    a { color: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" style="width:100%;height:100vh;"></div>

  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="landing-v2.jsx"></script>
  <script type="text/babel">
    // Página pública — renderiza directamente a LandingV2
    const TWEAK_DEFAULTS = { bg: 'paper', countdownStyle: 'editorial', dome: true };
    function LandingApp() {
      const [lang, setLang] = React.useState('pt');
      return (
        <div style={{ width: '100%', height: '100vh' }}>
          <LandingV2
            tweaks={TWEAK_DEFAULTS}
            lang={lang}
            setLang={setLang}
          />
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LandingApp />);
  </script>
</body>
</html>
